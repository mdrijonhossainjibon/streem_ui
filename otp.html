<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamVault — OTP Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        body: ['"Sora"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --bg: #08080f;
            --card: rgba(255,255,255,0.03);
            --card-border: rgba(255,255,255,0.06);
            --accent: #e50914;
            --accent-glow: rgba(229,9,20,0.3);
            --purple: #8b5cf6;
            --purple-glow: rgba(139,92,246,0.22);
            --green: #22c55e;
            --green-glow: rgba(34,197,94,0.25);
            --muted: rgba(255,255,255,0.35);
            --dim: rgba(255,255,255,0.18);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Sora', sans-serif;
            background: var(--bg);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Background glow orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(130px);
            pointer-events: none;
            z-index: 0;
        }
        .orb-1 {
            width: 520px; height: 520px;
            top: -200px; right: -140px;
            background: var(--accent);
            opacity: 0.055;
            animation: orbDrift1 14s ease-in-out infinite;
        }
        .orb-2 {
            width: 460px; height: 460px;
            bottom: -220px; left: -120px;
            background: var(--purple);
            opacity: 0.045;
            animation: orbDrift2 17s ease-in-out infinite;
        }
        .orb-3 {
            width: 280px; height: 280px;
            top: 40%; left: 15%;
            background: var(--accent);
            opacity: 0.02;
            animation: orbDrift3 11s ease-in-out infinite;
        }

        @keyframes orbDrift1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-35px, 30px) scale(1.1); }
        }
        @keyframes orbDrift2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -35px) scale(1.12); }
        }
        @keyframes orbDrift3 {
            0%, 100% { transform: scale(1); opacity: 0.02; }
            50% { transform: scale(1.25); opacity: 0.035; }
        }

        /* Noise texture */
        .noise {
            position: fixed; inset: 0; z-index: 1;
            pointer-events: none; opacity: 0.012;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 200px 200px;
        }

        /* Glass card */
        .glass-card {
            background: var(--card);
            backdrop-filter: blur(44px) saturate(1.2);
            -webkit-backdrop-filter: blur(44px) saturate(1.2);
            border: 1px solid var(--card-border);
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.015) inset,
                0 24px 70px rgba(0,0,0,0.55),
                0 0 90px rgba(229,9,20,0.025);
        }

        /* Card entrance */
        .card-enter {
            animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(28px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Stagger children entrance */
        .stagger > *:nth-child(1) { animation-delay: 0.12s; }
        .stagger > *:nth-child(2) { animation-delay: 0.2s; }
        .stagger > *:nth-child(3) { animation-delay: 0.28s; }
        .stagger > *:nth-child(4) { animation-delay: 0.36s; }
        .stagger > *:nth-child(5) { animation-delay: 0.44s; }
        .stagger > *:nth-child(6) { animation-delay: 0.52s; }
        .stagger > * {
            opacity: 0;
            animation: childIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes childIn {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* OTP input box */
        .otp-box {
            width: 52px; height: 62px;
            background: rgba(255,255,255,0.03);
            border: 1.5px solid rgba(255,255,255,0.07);
            border-radius: 16px;
            color: #fff;
            font-family: 'Sora', sans-serif;
            font-size: 1.35rem;
            font-weight: 700;
            text-align: center;
            caret-color: var(--accent);
            transition: border-color 0.35s ease, box-shadow 0.35s ease, background 0.35s ease, transform 0.2s ease;
            outline: none;
        }
        .otp-box:focus {
            border-color: var(--accent);
            background: rgba(255,255,255,0.05);
            box-shadow:
                0 0 0 3px var(--accent-glow),
                0 0 24px rgba(229,9,20,0.06);
            transform: translateY(-2px);
        }
        .otp-box.filled {
            border-color: var(--purple);
            background: rgba(139,92,246,0.06);
        }
        .otp-box.filled:focus {
            border-color: var(--accent);
            box-shadow:
                0 0 0 3px var(--accent-glow),
                0 0 24px rgba(229,9,20,0.06);
        }
        .otp-box.success {
            border-color: var(--green) !important;
            background: rgba(34,197,94,0.08) !important;
            box-shadow: 0 0 0 3px var(--green-glow), 0 0 20px rgba(34,197,94,0.08) !important;
            transform: translateY(-2px) scale(1.04);
        }
        .otp-box.error {
            border-color: var(--accent) !important;
            background: rgba(229,9,20,0.08) !important;
            box-shadow: 0 0 0 3px var(--accent-glow) !important;
            animation: otpShake 0.4s ease;
        }

        @keyframes otpShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        /* Pop animation when digit entered */
        @keyframes otpPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.08) translateY(-2px); }
            100% { transform: scale(1); }
        }
        .otp-pop {
            animation: otpPop 0.2s ease;
        }

        /* Gradient verify button */
        .btn-gradient {
            background: linear-gradient(135deg, var(--accent) 0%, var(--purple) 100%);
            background-size: 200% 200%;
            transition: transform 0.3s ease, box-shadow 0.3s ease, background-position 0.5s ease, opacity 0.3s ease;
        }
        .btn-gradient:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow:
                0 0 28px var(--accent-glow),
                0 0 60px rgba(139,92,246,0.1),
                0 10px 35px rgba(0,0,0,0.4);
            background-position: 100% 100%;
        }
        .btn-gradient:active:not(:disabled) {
            transform: scale(0.98);
        }
        .btn-gradient:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Back link underline */
        .link-line {
            position: relative;
            display: inline-block;
        }
        .link-line::after {
            content: '';
            position: absolute;
            bottom: -2px; left: 0;
            width: 0; height: 1px;
            background: rgba(255,255,255,0.45);
            transition: width 0.35s ease;
        }
        .link-line:hover::after { width: 100%; }

        /* Resend link */
        .resend-link {
            transition: color 0.3s ease, opacity 0.3s ease;
        }
        .resend-link.active {
            color: var(--accent) !important;
            cursor: pointer;
        }
        .resend-link.active:hover {
            color: #ff2d38 !important;
        }

        /* Success state entrance */
        .success-enter {
            animation: successIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes successIn {
            from { opacity: 0; transform: translateY(22px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Success ring pulse */
        .ring-pulse {
            animation: ringPulse 2s ease-in-out infinite;
        }
        @keyframes ringPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.3); }
            50% { box-shadow: 0 0 0 14px rgba(34,197,94,0); }
        }

        /* Checkmark draw */
        .check-draw {
            stroke-dasharray: 30;
            stroke-dashoffset: 30;
            animation: drawCheck 0.45s 0.35s ease forwards;
        }
        @keyframes drawCheck {
            to { stroke-dashoffset: 0; }
        }

        /* Focus visible */
        *:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
            border-radius: 8px;
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Responsive OTP sizing */
        @media (max-width: 380px) {
            .otp-box {
                width: 44px; height: 54px;
                font-size: 1.15rem;
                border-radius: 12px;
            }
        }
    </style>
</head>
<body>

    <!-- Background atmosphere -->
    <div class="orb orb-1" aria-hidden="true"></div>
    <div class="orb orb-2" aria-hidden="true"></div>
    <div class="orb orb-3" aria-hidden="true"></div>
    <div class="noise" aria-hidden="true"></div>

    <!-- Main centered content -->
    <main class="relative z-10 min-h-screen flex items-center justify-center px-4 py-12">

        <!-- ===== OTP FORM STATE ===== -->
        <div id="otpForm" class="glass-card card-enter rounded-3xl w-full max-w-[420px] px-7 sm:px-10 py-10 sm:py-12">

            <div class="stagger flex flex-col items-center">

                <!-- Lock icon -->
                <div class="mb-7">
                    <div class="w-14 h-14 rounded-2xl flex items-center justify-center relative" style="background: rgba(229,9,20,0.08); border: 1px solid rgba(229,9,20,0.15);">
                        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="3"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            <circle cx="12" cy="16.5" r="1.5" fill="var(--accent)" stroke="none"/>
                        </svg>
                        <!-- Subtle glow behind icon -->
                        <div class="absolute inset-0 rounded-2xl" style="box-shadow: 0 0 30px rgba(229,9,20,0.08);" aria-hidden="true"></div>
                    </div>
                </div>

                <!-- Title & subtitle -->
                <div class="text-center mb-8">
                    <h1 class="text-[1.6rem] sm:text-[1.75rem] font-bold tracking-tight leading-tight mb-2">
                        Verify Your Account
                    </h1>
                    <p class="text-sm leading-relaxed" style="color: var(--muted);">
                        Enter the 6-digit code sent to<br>
                        <span class="font-medium text-white/50">a***x@email.com</span>
                    </p>
                </div>

                <!-- 6-digit OTP inputs -->
                <div class="flex gap-2.5 sm:gap-3 mb-3" id="otpContainer" role="group" aria-label="One-time password">
                    <input type="text" inputmode="numeric" maxlength="1" class="otp-box" aria-label="Digit 1" data-idx="0" autocomplete="one-time-code">
                    <input type="text" inputmode="numeric" maxlength="1" class="otp-box" aria-label="Digit 2" data-idx="1">
                    <input type="text" inputmode="numeric" maxlength="1" class="otp-box" aria-label="Digit 3" data-idx="2">
                    <input type="text" inputmode="numeric" maxlength="1" class="otp-box" aria-label="Digit 4" data-idx="3">
                    <input type="text" inputmode="numeric" maxlength="1" class="otp-box" aria-label="Digit 5" data-idx="4">
                    <input type="text" inputmode="numeric" maxlength="1" class="otp-box" aria-label="Digit 6" data-idx="5">
                </div>

                <!-- Error message (hidden) -->
                <p id="otpError" class="hidden text-xs mb-4 h-5 flex items-center gap-1.5" style="color: var(--accent);">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                    <span>Invalid code. Please try again.</span>
                </p>
                <div id="otpErrorSpacer" class="h-5 mb-4"></div>

                <!-- Verify button -->
                <button
                    id="verifyBtn"
                    onclick="handleVerify()"
                    disabled
                    class="btn-gradient w-full py-3.5 rounded-2xl text-sm font-semibold text-white cursor-pointer border-0 mb-5"
                >
                    <span id="verifyText">Verify Code</span>
                </button>

                <!-- Resend code -->
                <div class="text-center mb-5">
                    <p class="text-xs" style="color: var(--dim);" id="resendArea">
                        <span class="resend-link" id="resendLink" style="color: var(--dim); cursor: default;" onclick="handleResend()">Resend Code</span>
                        <span id="resendTimer" class="ml-1 tabular-nums"></span>
                    </p>
                </div>

                <!-- Back to login -->
                <a
                    href="#"
                    class="link-line text-xs font-medium transition-colors duration-300"
                    style="color: var(--muted);"
                    onmouseover="this.style.color='rgba(255,255,255,0.7)'"
                    onmouseout="this.style.color='var(--muted)'"
                >
                    <span class="inline-flex items-center gap-1.5">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 18 9 12 15 6"/>
                        </svg>
                        Back to Sign In
                    </span>
                </a>

            </div>
        </div>

        <!-- ===== SUCCESS STATE ===== -->
        <div id="successState" class="hidden glass-card rounded-3xl w-full max-w-[420px] px-7 sm:px-10 py-10 sm:py-12">
            <div class="success-enter flex flex-col items-center text-center">

                <!-- Animated success icon -->
                <div class="relative mb-7">
                    <div class="ring-pulse w-20 h-20 rounded-full flex items-center justify-center" style="background: rgba(34,197,94,0.08); border: 1.5px solid rgba(34,197,94,0.2);">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline class="check-draw" points="6 12 10 16 18 8"/>
                        </svg>
                    </div>
                </div>

                <h2 class="text-[1.6rem] sm:text-[1.75rem] font-bold tracking-tight leading-tight mb-2.5">
                    Verified Successfully
                </h2>
                <p class="text-sm leading-relaxed mb-2" style="color: var(--muted);">
                    Your identity has been confirmed
                </p>
                <p class="text-xs mb-8" style="color: var(--dim);">
                    Redirecting you to your account...
                </p>

                <!-- Continue button -->
                <button
                    class="w-full py-3.5 rounded-2xl text-sm font-semibold text-white cursor-pointer border-0 transition-all duration-300 hover:scale-[1.02] active:scale-[0.98]"
                    style="background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);"
                    onmouseover="this.style.background='rgba(255,255,255,0.1)'"
                    onmouseout="this.style.background='rgba(255,255,255,0.06)'"
                >
                    Continue to StreamVault
                </button>
            </div>
        </div>

    </main>

    <script>
        // ============================
        // OTP Input Logic
        // ============================
        const boxes = document.querySelectorAll('.otp-box');
        const verifyBtn = document.getElementById('verifyBtn');
        const verifyText = document.getElementById('verifyText');
        const otpError = document.getElementById('otpError');
        const otpErrorSpacer = document.getElementById('otpErrorSpacer');
        const resendLink = document.getElementById('resendLink');
        const resendTimer = document.getElementById('resendTimer');

        let countdown = 30;
        let timerInterval = null;

        // Start countdown on load
        startCountdown();

        // Auto-focus first box
        boxes[0].focus();

        // Input handler — advance to next box on digit entry
        boxes.forEach((box, idx) => {
            box.addEventListener('input', function(e) {
                // Allow only digits
                const val = this.value.replace(/\D/g, '');
                this.value = val.slice(0, 1);

                // Hide error when user types
                hideError();

                if (val && idx < boxes.length - 1) {
                    boxes[idx + 1].focus();
                }

                // Pop animation on fill
                if (val) {
                    this.classList.add('otp-pop', 'filled');
                    setTimeout(() => this.classList.remove('otp-pop'), 200);
                } else {
                    this.classList.remove('filled');
                }

                updateVerifyButton();
            });

            // Handle backspace — go to previous box
            box.addEventListener('keydown', function(e) {
                if (e.key === 'Backspace') {
                    if (!this.value && idx > 0) {
                        boxes[idx - 1].focus();
                        boxes[idx - 1].value = '';
                        boxes[idx - 1].classList.remove('filled');
                        updateVerifyButton();
                    } else {
                        this.classList.remove('filled');
                    }
                    hideError();
                }

                // Allow Enter to submit
                if (e.key === 'Enter') {
                    e.preventDefault();
                    if (!verifyBtn.disabled) handleVerify();
                }

                // Arrow key navigation
                if (e.key === 'ArrowLeft' && idx > 0) {
                    e.preventDefault();
                    boxes[idx - 1].focus();
                }
                if (e.key === 'ArrowRight' && idx < boxes.length - 1) {
                    e.preventDefault();
                    boxes[idx + 1].focus();
                }
            });

            // Select text on focus for easy overwrite
            box.addEventListener('focus', function() {
                this.select();
            });

            // Paste support — distribute digits across boxes
            box.addEventListener('paste', function(e) {
                e.preventDefault();
                const paste = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
                if (!paste) return;

                // Fill boxes starting from current index
                for (let i = 0; i < paste.length && (idx + i) < boxes.length; i++) {
                    boxes[idx + i].value = paste[i];
                    boxes[idx + i].classList.add('filled');
                    // Trigger pop animation staggered
                    setTimeout(() => {
                        boxes[idx + i].classList.add('otp-pop');
                        setTimeout(() => boxes[idx + i].classList.remove('otp-pop'), 200);
                    }, i * 60);
                }

                // Focus next empty box or last filled
                const nextEmpty = Array.from(boxes).findIndex((b, i) => i >= idx && !b.value);
                if (nextEmpty !== -1) {
                    boxes[nextEmpty].focus();
                } else {
                    boxes[Math.min(idx + paste.length, boxes.length - 1)].focus();
                }

                hideError();
                updateVerifyButton();
            });
        });

        // Update verify button disabled state
        function updateVerifyButton() {
            const allFilled = Array.from(boxes).every(b => b.value.length === 1);
            verifyBtn.disabled = !allFilled;
        }

        // ============================
        // Verify Handler
        // ============================
        function handleVerify() {
            const code = Array.from(boxes).map(b => b.value).join('');

            // For demo: accept "123456" as valid, else show error
            const isValid = code.length === 6 && code === '123456';

            if (!isValid) {
                // Show error + shake animation
                otpError.classList.remove('hidden');
                otpErrorSpacer.classList.add('hidden');
                boxes.forEach(b => {
                    b.classList.add('error');
                    setTimeout(() => b.classList.remove('error'), 450);
                });
                return;
            }

            // Show loading state
            verifyBtn.disabled = true;
            verifyText.innerHTML = '<span class="spinner"></span>';

            // Success animation on boxes — sequential green fill
            boxes.forEach((box, i) => {
                setTimeout(() => {
                    box.classList.add('success');
                    box.classList.remove('filled');
                }, i * 80);
            });

            // Transition to success state after animation
            setTimeout(() => {
                document.getElementById('otpForm').classList.add('hidden');
                const successEl = document.getElementById('successState');
                successEl.classList.remove('hidden');
                // Re-trigger animation
                const inner = successEl.querySelector('.success-enter');
                inner.style.animation = 'none';
                inner.offsetHeight;
                inner.style.animation = '';
            }, 800);

            // Reset for demo
            setTimeout(() => {
                resetForm();
            }, 3500);
        }

        // ============================
        // Error handling
        // ============================
        function hideError() {
            otpError.classList.add('hidden');
            otpErrorSpacer.classList.remove('hidden');
        }

        // ============================
        // Resend countdown
        // ============================
        function startCountdown() {
            countdown = 30;
            resendLink.classList.remove('active');
            resendLink.style.color = 'var(--dim)';
            resendLink.style.cursor = 'default';
            resendTimer.textContent = `in ${countdown}s`;

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                countdown--;
                if (countdown <= 0) {
                    clearInterval(timerInterval);
                    resendTimer.textContent = '';
                    resendLink.classList.add('active');
                    resendLink.style.color = '';
                    resendLink.style.cursor = '';
                } else {
                    resendTimer.textContent = `in ${countdown}s`;
                }
            }, 1000);
        }

        function handleResend() {
            if (countdown > 0) return;

            // Clear all inputs
            boxes.forEach(b => {
                b.value = '';
                b.classList.remove('filled', 'success', 'error');
            });
            boxes[0].focus();
            updateVerifyButton();
            hideError();

            // Restart countdown
            startCountdown();
        }

        // ============================
        // Reset form (for demo loop)
        // ============================
        function resetForm() {
            document.getElementById('successState').classList.add('hidden');
            const formEl = document.getElementById('otpForm');
            formEl.classList.remove('hidden');

            // Re-trigger entrance animations
            formEl.style.animation = 'none';
            formEl.offsetHeight;
            formEl.style.animation = '';

            const children = formEl.querySelector('.stagger').children;
            Array.from(children).forEach(child => {
                child.style.animation = 'none';
                child.offsetHeight;
                child.style.animation = '';
            });

            // Clear inputs
            boxes.forEach(b => {
                b.value = '';
                b.classList.remove('filled', 'success', 'error');
            });

            verifyBtn.disabled = true;
            verifyText.textContent = 'Verify Code';
            hideError();
            startCountdown();

            // Focus first box after animations settle
            setTimeout(() => boxes[0].focus(), 600);
        }
    </script>

</body>
</html>
