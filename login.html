<!-- AI Generated Streaming Login UI -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamVault — Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { outfit: ['Outfit', 'sans-serif'] },
                    colors: {
                        vault: {
                            bg: '#06060c',
                            surface: '#0e0e18',
                            card: '#141420',
                            border: '#1e1e30',
                            muted: '#6b6b8a',
                            text: '#c8c8e0',
                            light: '#eeeef5',
                            accent: '#e8443a',
                            accentHover: '#ff5a50',
                            purple: '#a855f7',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --accent: #e8443a;
            --accent-hover: #ff5a50;
            --purple: #a855f7;
            --bg: #06060c;
            --surface: #0e0e18;
            --card: #141420;
            --border: #1e1e30;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: #c8c8e0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Scrollbar hide */
        ::-webkit-scrollbar { display: none; }

        /* Cinematic background layers */
        .cinema-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
        }
        .cinema-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(8px) brightness(0.3) saturate(1.2);
            transform: scale(1.1);
        }
        .cinema-overlay {
            background: 
                linear-gradient(180deg, rgba(6,6,12,0.7) 0%, rgba(6,6,12,0.4) 40%, rgba(6,6,12,0.85) 100%),
                radial-gradient(ellipse at 50% 0%, rgba(168,85,247,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(232,68,58,0.06) 0%, transparent 50%);
        }

        /* Floating particles */
        @keyframes float-up {
            0% { transform: translateY(100vh) translateX(0) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-10vh) translateX(40px) scale(1); opacity: 0; }
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: float-up linear infinite;
        }

        /* Glass card */
        .glass-card {
            background: rgba(14, 14, 24, 0.45);
            backdrop-filter: blur(40px) saturate(1.3);
            -webkit-backdrop-filter: blur(40px) saturate(1.3);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 
                0 0 0 1px rgba(255,255,255,0.03) inset,
                0 30px 80px -20px rgba(0,0,0,0.7),
                0 0 120px -40px rgba(232, 68, 58, 0.08),
                0 0 120px -40px rgba(168, 85, 247, 0.08);
        }

        /* Glass input */
        .glass-input {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .glass-input:focus-within {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(232, 68, 58, 0.4);
            box-shadow: 
                0 0 0 3px rgba(232, 68, 58, 0.08),
                0 0 30px -10px rgba(232, 68, 58, 0.15);
        }
        .glass-input:focus-within .input-icon {
            color: var(--accent-hover);
        }
        .glass-input input {
            background: transparent;
            outline: none;
            color: #eeeef5;
            width: 100%;
            font-family: 'Outfit', sans-serif;
        }
        .glass-input input::placeholder {
            color: #6b6b8a;
        }

        /* Gradient button */
        .btn-gradient {
            background: linear-gradient(135deg, #e8443a 0%, #c0392b 40%, #a855f7 100%);
            background-size: 200% 200%;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
            overflow: hidden;
        }
        .btn-gradient::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }
        .btn-gradient:hover::before {
            transform: translateX(100%);
        }
        .btn-gradient:hover {
            background-position: 100% 0;
            box-shadow: 0 8px 40px -8px rgba(232, 68, 58, 0.5), 0 0 60px -20px rgba(168, 85, 247, 0.3);
            transform: scale(1.02);
        }
        .btn-gradient:active {
            transform: scale(0.98);
        }

        /* Google button */
        .btn-google {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }
        .btn-google:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
        }

        /* Toggle switch */
        .toggle-track {
            width: 40px;
            height: 22px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 11px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s ease;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .toggle-track.active {
            background: linear-gradient(135deg, #e8443a, #a855f7);
            border-color: transparent;
        }
        .toggle-thumb {
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        .toggle-track.active .toggle-thumb {
            transform: translateX(18px);
        }

        /* Animated underline link */
        .link-underline {
            position: relative;
            text-decoration: none;
        }
        .link-underline::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background: linear-gradient(90deg, #e8443a, #a855f7);
            transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .link-underline:hover::after {
            width: 100%;
        }

        /* Card entrance animation */
        @keyframes card-enter {
            0% { opacity: 0; transform: translateY(40px) scale(0.96); filter: blur(8px); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }
        .card-animate {
            animation: card-enter 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.3s both;
        }

        /* Stagger children */
        @keyframes item-enter {
            0% { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .stagger > * {
            animation: item-enter 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
        }
        .stagger > *:nth-child(1) { animation-delay: 0.5s; }
        .stagger > *:nth-child(2) { animation-delay: 0.6s; }
        .stagger > *:nth-child(3) { animation-delay: 0.7s; }
        .stagger > *:nth-child(4) { animation-delay: 0.8s; }
        .stagger > *:nth-child(5) { animation-delay: 0.9s; }
        .stagger > *:nth-child(6) { animation-delay: 1.0s; }
        .stagger > *:nth-child(7) { animation-delay: 1.1s; }
        .stagger > *:nth-child(8) { animation-delay: 1.2s; }

        /* Subtle glow ring around card on hover */
        .glow-ring {
            position: relative;
        }
        .glow-ring::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 1.25rem;
            background: linear-gradient(135deg, rgba(232,68,58,0.15), transparent 40%, transparent 60%, rgba(168,85,247,0.15));
            z-index: -1;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .glow-ring:hover::before {
            opacity: 1;
        }

        /* Divider */
        .divider-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
        }

        /* Error shake */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }
        .shake { animation: shake 0.4s ease; }

        /* Success checkmark */
        @keyframes check-draw {
            0% { stroke-dashoffset: 30; }
            100% { stroke-dashoffset: 0; }
        }

        /* Toast notification */
        @keyframes toast-in {
            0% { transform: translateY(20px) scale(0.95); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }
        @keyframes toast-out {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-10px) scale(0.95); opacity: 0; }
        }
        .toast {
            animation: toast-in 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
        }
        .toast.hiding {
            animation: toast-out 0.3s ease both;
        }

        /* Password visibility toggle */
        .pw-toggle {
            cursor: pointer;
            color: #6b6b8a;
            transition: color 0.2s;
        }
        .pw-toggle:hover {
            color: #c8c8e0;
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body class="font-outfit">

    <!-- ============ CINEMATIC BACKGROUND ============ -->
    <div class="cinema-bg" aria-hidden="true">
        <!-- Background image -->
        <img src="https://picsum.photos/seed/cinema-dark-abyss/1920/1080.jpg" alt="" loading="eager">
        <!-- Overlays -->
        <div class="cinema-overlay absolute inset-0"></div>
        <!-- Particles container -->
        <div id="particles" class="absolute inset-0 overflow-hidden"></div>
    </div>

    <!-- ============ MAIN CONTENT ============ -->
    <main class="relative z-10 min-h-screen flex items-center justify-center px-4 py-8 sm:py-12">
        <div class="w-full max-w-[440px]">

            <!-- ============ LOGIN CARD ============ -->
            <div class="glass-card glow-ring rounded-2xl p-8 sm:p-10 card-animate">

                <!-- Staggered inner content -->
                <div class="stagger">

                    <!-- Logo -->
                    <div class="flex justify-center mb-7">
                        <div class="relative group cursor-pointer">
                            <!-- Logo glow -->
                            <div class="absolute inset-0 bg-gradient-to-br from-vault-accent/20 to-vault-purple/20 rounded-2xl blur-xl opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                            <svg width="48" height="48" viewBox="0 0 48 48" fill="none" class="relative transition-transform duration-300 group-hover:scale-110">
                                <rect width="48" height="48" rx="14" fill="url(#logoGrad)"/>
                                <path d="M19 14l14 10-14 10V14z" fill="white"/>
                                <defs>
                                    <linearGradient id="logoGrad" x1="0" y1="0" x2="48" y2="48">
                                        <stop offset="0%" stop-color="#e8443a"/>
                                        <stop offset="100%" stop-color="#a855f7"/>
                                    </linearGradient>
                                </defs>
                            </svg>
                        </div>
                    </div>

                    <!-- Title -->
                    <div class="text-center mb-8">
                        <h1 class="text-2xl sm:text-[28px] font-800 text-white tracking-tight leading-tight">Welcome Back</h1>
                        <p class="text-sm text-vault-muted mt-2 font-light">Sign in to continue streaming</p>
                    </div>

                    <!-- Email Input -->
                    <div class="mb-4">
                        <div class="glass-input flex items-center gap-3 rounded-2xl px-4 py-3.5" id="emailField">
                            <!-- Mail icon -->
                            <svg class="input-icon flex-shrink-0 transition-colors duration-300" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6b6b8a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="2" y="4" width="20" height="16" rx="2"/>
                                <polyline points="22,4 12,13 2,4"/>
                            </svg>
                            <input 
                                type="email" 
                                id="emailInput"
                                placeholder="Email or username" 
                                class="text-sm font-light"
                                autocomplete="email"
                                aria-label="Email or username"
                            >
                        </div>
                        <!-- Error message (hidden by default) -->
                        <p id="emailError" class="text-xs text-vault-accent mt-1.5 ml-1 hidden flex items-center gap-1">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                            <span>Please enter a valid email address</span>
                        </p>
                    </div>

                    <!-- Password Input -->
                    <div class="mb-4">
                        <div class="glass-input flex items-center gap-3 rounded-2xl px-4 py-3.5" id="passwordField">
                            <!-- Lock icon -->
                            <svg class="input-icon flex-shrink-0 transition-colors duration-300" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6b6b8a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0110 0v4"/>
                            </svg>
                            <input 
                                type="password" 
                                id="passwordInput"
                                placeholder="Password" 
                                class="text-sm font-light"
                                autocomplete="current-password"
                                aria-label="Password"
                            >
                            <!-- Eye toggle -->
                            <button type="button" class="pw-toggle flex-shrink-0" onclick="togglePassword()" aria-label="Toggle password visibility">
                                <svg id="eyeOpen" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                                <svg id="eyeClosed" class="hidden" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
                                    <line x1="1" y1="1" x2="23" y2="23"/>
                                </svg>
                            </button>
                        </div>
                        <!-- Error message -->
                        <p id="passwordError" class="text-xs text-vault-accent mt-1.5 ml-1 hidden flex items-center gap-1">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                            <span>Password must be at least 6 characters</span>
                        </p>
                    </div>

                    <!-- Remember me + Forgot password -->
                    <div class="flex items-center justify-between mb-7">
                        <label class="flex items-center gap-2.5 cursor-pointer select-none" aria-label="Remember me">
                            <div class="toggle-track" id="rememberToggle" onclick="toggleRemember()" role="switch" aria-checked="false" tabindex="0">
                                <div class="toggle-thumb"></div>
                            </div>
                            <span class="text-sm text-vault-muted">Remember me</span>
                        </label>
                        <a href="#" class="link-underline text-sm text-vault-text hover:text-vault-light transition-colors font-medium" onclick="showToast('Password reset link sent to your email', 'info'); return false;">
                            Forgot password?
                        </a>
                    </div>

                    <!-- Sign In Button -->
                    <button 
                        type="button" 
                        class="btn-gradient w-full py-3.5 rounded-2xl text-white font-semibold text-sm tracking-wide flex items-center justify-center gap-2"
                        onclick="handleSignIn()"
                        id="signInBtn"
                    >
                        <span id="btnText">Sign In</span>
                        <!-- Loading spinner (hidden) -->
                        <svg id="btnSpinner" class="hidden animate-spin" width="18" height="18" viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="12" r="10" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
                            <path d="M12 2a10 10 0 019.95 9" stroke="white" stroke-width="3" stroke-linecap="round"/>
                        </svg>
                        <!-- Success check (hidden) -->
                        <svg id="btnCheck" class="hidden" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12" style="stroke-dasharray: 30; stroke-dashoffset: 0;"/>
                        </svg>
                    </button>

                    <!-- Divider -->
                    <div class="flex items-center gap-4 my-6">
                        <div class="divider-line flex-1"></div>
                        <span class="text-xs text-vault-muted font-medium uppercase tracking-widest">or</span>
                        <div class="divider-line flex-1"></div>
                    </div>

                    <!-- Google Button -->
                    <button 
                        type="button" 
                        class="btn-google w-full py-3 rounded-2xl text-vault-text font-medium text-sm flex items-center justify-center gap-2.5"
                        onclick="showToast('Google sign-in initiated...', 'info')"
                    >
                        <!-- Google SVG icon -->
                        <svg width="18" height="18" viewBox="0 0 24 24">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                        Continue with Google
                    </button>

                    <!-- Create account -->
                    <p class="text-center text-sm text-vault-muted mt-6">
                        Don't have an account? 
                        <a href="#" class="link-underline text-vault-light hover:text-white transition-colors font-medium" onclick="showToast('Redirecting to registration...', 'info'); return false;">
                            Create one
                        </a>
                    </p>

                </div>
            </div>

            <!-- Bottom branding -->
            <div class="text-center mt-8 stagger" style="animation-delay: 1.4s;">
                <p class="text-xs text-vault-muted/50">&copy; 2024 StreamVault. All rights reserved.</p>
            </div>

        </div>
    </main>

    <!-- ============ TOAST CONTAINER ============ -->
    <div id="toastContainer" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex flex-col items-center gap-3 pointer-events-none"></div>

    <script>
        // ====== PARTICLES ======
        // Generate subtle floating particles for cinematic atmosphere
        function createParticles() {
            const container = document.getElementById('particles');
            const count = 20;
            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                // Randomize particle properties
                const size = Math.random() * 3 + 1;
                const left = Math.random() * 100;
                const duration = Math.random() * 15 + 10;
                const delay = Math.random() * 15;
                const isAccent = Math.random() > 0.5;
                const color = isAccent 
                    ? 'rgba(232, 68, 58, 0.3)' 
                    : 'rgba(168, 85, 247, 0.25)';
                particle.style.cssText = `
                    width: ${size}px;
                    height: ${size}px;
                    left: ${left}%;
                    background: ${color};
                    box-shadow: 0 0 ${size * 3}px ${color};
                    animation-duration: ${duration}s;
                    animation-delay: ${delay}s;
                `;
                container.appendChild(particle);
            }
        }

        // ====== PASSWORD VISIBILITY TOGGLE ======
        let passwordVisible = false;
        function togglePassword() {
            passwordVisible = !passwordVisible;
            const input = document.getElementById('passwordInput');
            const eyeOpen = document.getElementById('eyeOpen');
            const eyeClosed = document.getElementById('eyeClosed');
            input.type = passwordVisible ? 'text' : 'password';
            eyeOpen.classList.toggle('hidden', passwordVisible);
            eyeClosed.classList.toggle('hidden', !passwordVisible);
        }

        // ====== REMEMBER ME TOGGLE ======
        let rememberActive = false;
        function toggleRemember() {
            rememberActive = !rememberActive;
            const track = document.getElementById('rememberToggle');
            track.classList.toggle('active', rememberActive);
            track.setAttribute('aria-checked', rememberActive.toString());
        }
        // Keyboard support for toggle
        document.getElementById('rememberToggle').addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'Enter') {
                e.preventDefault();
                toggleRemember();
            }
        });

        // ====== FORM VALIDATION & SIGN IN ======
        function validateEmail(email) {
            // Basic email pattern check
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email) || email.length >= 3;
        }

        function validatePassword(password) {
            return password.length >= 6;
        }

        function showFieldError(fieldId, errorId) {
            const field = document.getElementById(fieldId);
            const error = document.getElementById(errorId);
            field.style.borderColor = 'rgba(232, 68, 58, 0.5)';
            error.classList.remove('hidden');
            field.classList.add('shake');
            setTimeout(() => field.classList.remove('shake'), 400);
        }

        function clearFieldError(fieldId, errorId) {
            const field = document.getElementById(fieldId);
            const error = document.getElementById(errorId);
            field.style.borderColor = '';
            error.classList.add('hidden');
        }

        // Clear errors on input
        document.getElementById('emailInput').addEventListener('input', () => {
            clearFieldError('emailField', 'emailError');
        });
        document.getElementById('passwordInput').addEventListener('input', () => {
            clearFieldError('passwordField', 'passwordError');
        });

        async function handleSignIn() {
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value;
            const btn = document.getElementById('signInBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            const btnCheck = document.getElementById('btnCheck');

            let hasError = false;

            // Validate
            if (!validateEmail(email)) {
                showFieldError('emailField', 'emailError');
                hasError = true;
            }
            if (!validatePassword(password)) {
                showFieldError('passwordField', 'passwordError');
                hasError = true;
            }

            if (hasError) return;

            // Show loading state
            btn.disabled = true;
            btnText.textContent = 'Signing in...';
            btnSpinner.classList.remove('hidden');
            btnCheck.classList.add('hidden');

            // Simulate API call
            await new Promise(resolve => setTimeout(resolve, 2000));

            // Show success state
            btnSpinner.classList.add('hidden');
            btnCheck.classList.remove('hidden');
            btnText.textContent = 'Welcome back!';
            btn.style.background = 'linear-gradient(135deg, #22c55e, #16a34a)';

            showToast('Successfully signed in. Redirecting...', 'success');

            // Reset after delay (for demo purposes)
            setTimeout(() => {
                btn.disabled = false;
                btnText.textContent = 'Sign In';
                btnCheck.classList.add('hidden');
                btn.style.background = '';
            }, 3000);
        }

        // Enter key to submit
        document.getElementById('passwordInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleSignIn();
        });
        document.getElementById('emailInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('passwordInput').focus();
        });

        // ====== TOAST NOTIFICATIONS ======
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            
            // Color schemes per type
            const colors = {
                success: 'border-green-500/30 bg-green-500/10',
                error: 'border-red-500/30 bg-red-500/10',
                info: 'border-vault-border bg-vault-surface/80',
            };
            const iconColors = {
                success: '#22c55e',
                error: '#e8443a',
                info: '#6b6b8a',
            };
            const icons = {
                success: '<circle cx="12" cy="12" r="10"/><polyline points="16 9 10.5 14.5 8 12"/>',
                error: '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>',
                info: '<circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>',
            };

            toast.className = `toast pointer-events-auto flex items-center gap-3 px-5 py-3 rounded-2xl border backdrop-blur-xl shadow-2xl shadow-black/40 ${colors[type]} max-w-sm`;
            toast.innerHTML = `
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="${iconColors[type]}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    ${icons[type]}
                </svg>
                <span class="text-sm text-vault-light font-medium">${message}</span>
            `;

            container.appendChild(toast);

            // Auto dismiss
            setTimeout(() => {
                toast.classList.add('hiding');
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        // ====== INIT ======
        document.addEventListener('DOMContentLoaded', createParticles);
    </script>
</body>
</html>
