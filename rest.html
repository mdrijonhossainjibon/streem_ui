<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamVault — Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        body: ['"Sora"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --bg: #08080f;
            --card: rgba(255,255,255,0.03);
            --card-border: rgba(255,255,255,0.06);
            --accent: #e50914;
            --accent-glow: rgba(229,9,20,0.25);
            --purple: #8b5cf6;
            --purple-glow: rgba(139,92,246,0.2);
            --muted: rgba(255,255,255,0.35);
            --dim: rgba(255,255,255,0.18);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Sora', sans-serif;
            background: var(--bg);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background glow orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(130px);
            pointer-events: none;
            z-index: 0;
        }
        .orb-1 {
            width: 500px; height: 500px;
            top: -180px; right: -120px;
            background: var(--accent);
            opacity: 0.06;
            animation: orbFloat1 12s ease-in-out infinite;
        }
        .orb-2 {
            width: 450px; height: 450px;
            bottom: -200px; left: -100px;
            background: var(--purple);
            opacity: 0.05;
            animation: orbFloat2 15s ease-in-out infinite;
        }
        .orb-3 {
            width: 300px; height: 300px;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: var(--accent);
            opacity: 0.025;
            animation: orbFloat3 10s ease-in-out infinite;
        }

        @keyframes orbFloat1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-30px, 25px) scale(1.08); }
        }
        @keyframes orbFloat2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(25px, -30px) scale(1.1); }
        }
        @keyframes orbFloat3 {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.025; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.04; }
        }

        /* Glass card */
        .glass-card {
            background: var(--card);
            backdrop-filter: blur(40px) saturate(1.2);
            -webkit-backdrop-filter: blur(40px) saturate(1.2);
            border: 1px solid var(--card-border);
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.02) inset,
                0 20px 60px rgba(0,0,0,0.5),
                0 0 80px rgba(229,9,20,0.03);
        }

        /* Card entrance animation */
        .card-enter {
            animation: cardFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes cardFadeIn {
            from {
                opacity: 0;
                transform: translateY(24px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Stagger children */
        .stagger > *:nth-child(1) { animation-delay: 0.1s; }
        .stagger > *:nth-child(2) { animation-delay: 0.18s; }
        .stagger > *:nth-child(3) { animation-delay: 0.26s; }
        .stagger > *:nth-child(4) { animation-delay: 0.34s; }
        .stagger > *:nth-child(5) { animation-delay: 0.42s; }
        .stagger > * {
            opacity: 0;
            animation: childFadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes childFadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Input focus glow */
        .input-glow {
            transition: border-color 0.4s ease, box-shadow 0.4s ease, background 0.3s ease;
        }
        .input-glow:focus {
            border-color: var(--accent);
            box-shadow:
                0 0 0 3px var(--accent-glow),
                0 0 20px rgba(229,9,20,0.08);
            background: rgba(255,255,255,0.05);
        }

        /* Gradient button */
        .btn-gradient {
            background: linear-gradient(135deg, var(--accent) 0%, var(--purple) 100%);
            background-size: 200% 200%;
            transition: transform 0.3s ease, box-shadow 0.3s ease, background-position 0.5s ease;
        }
        .btn-gradient:hover {
            transform: scale(1.02);
            box-shadow:
                0 0 24px var(--accent-glow),
                0 0 60px rgba(139,92,246,0.12),
                0 8px 30px rgba(0,0,0,0.4);
            background-position: 100% 100%;
        }
        .btn-gradient:active {
            transform: scale(0.98);
        }

        /* Button loading spinner */
        .spinner {
            display: inline-block;
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Back link underline animation */
        .link-underline {
            position: relative;
            display: inline-block;
        }
        .link-underline::after {
            content: '';
            position: absolute;
            bottom: -2px; left: 0;
            width: 0; height: 1px;
            background: rgba(255,255,255,0.5);
            transition: width 0.35s ease;
        }
        .link-underline:hover::after {
            width: 100%;
        }

        /* Success state animation */
        .success-enter {
            animation: successSlideIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes successSlideIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Success icon ring animation */
        .ring-pulse {
            animation: ringPulse 2s ease-in-out infinite;
        }
        @keyframes ringPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.3); }
            50% { box-shadow: 0 0 0 12px rgba(34,197,94,0); }
        }

        /* Checkmark draw animation */
        .check-draw {
            stroke-dasharray: 30;
            stroke-dashoffset: 30;
            animation: drawCheck 0.5s 0.4s ease forwards;
        }
        @keyframes drawCheck {
            to { stroke-dashoffset: 0; }
        }

        /* Subtle noise texture overlay */
        .noise-overlay {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            opacity: 0.015;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 200px 200px;
        }

        /* Focus visible for accessibility */
        *:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
            border-radius: 8px;
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

    <!-- Background atmospheric elements -->
    <div class="orb orb-1" aria-hidden="true"></div>
    <div class="orb orb-2" aria-hidden="true"></div>
    <div class="orb orb-3" aria-hidden="true"></div>
    <div class="noise-overlay" aria-hidden="true"></div>

    <!-- Main content — centered card -->
    <main class="relative z-10 min-h-screen flex items-center justify-center px-4 py-12">

        <!-- === FORM STATE === -->
        <div id="formState" class="glass-card card-enter rounded-3xl w-full max-w-md px-8 sm:px-10 py-10 sm:py-12">

            <div class="stagger flex flex-col items-center">

                <!-- Logo -->
                <div class="mb-8">
                    <div class="w-12 h-12 rounded-2xl flex items-center justify-center" style="background: linear-gradient(135deg, var(--accent), var(--purple));">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                            <path d="M8 5.14v13.72a.5.5 0 0 0 .75.43l11.5-6.86a.5.5 0 0 0 0-.86L8.75 4.71a.5.5 0 0 0-.75.43Z" fill="#fff"/>
                        </svg>
                    </div>
                </div>

                <!-- Title -->
                <div class="text-center mb-8">
                    <h1 class="text-2xl sm:text-[1.7rem] font-bold tracking-tight leading-tight mb-2.5">
                        Reset Your Password
                    </h1>
                    <p class="text-sm leading-relaxed" style="color: var(--muted);">
                        Enter your email and we'll send you a reset link
                    </p>
                </div>

                <!-- Email input -->
                <div class="w-full mb-5">
                    <label for="emailInput" class="sr-only">Email address</label>
                    <div class="relative">
                        <!-- Mail icon -->
                        <div class="absolute left-4 top-1/2 -translate-y-1/2 pointer-events-none" style="color: var(--dim);">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="2" y="4" width="20" height="16" rx="3"/>
                                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                            </svg>
                        </div>
                        <input
                            id="emailInput"
                            type="email"
                            placeholder="you@example.com"
                            autocomplete="email"
                            required
                            class="input-glow w-full pl-12 pr-4 py-3.5 rounded-2xl text-sm text-white placeholder-white/20 border border-white/[0.06] bg-white/[0.03] focus:outline-none"
                        >
                    </div>
                    <!-- Error message (hidden by default) -->
                    <p id="errorMsg" class="hidden text-xs mt-2 pl-1" style="color: var(--accent);">
                        Please enter a valid email address
                    </p>
                </div>

                <!-- Submit button -->
                <button
                    id="submitBtn"
                    onclick="handleSubmit()"
                    class="btn-gradient w-full py-3.5 rounded-2xl text-sm font-semibold text-white cursor-pointer border-0 mb-6"
                >
                    <span id="btnText">Send Reset Link</span>
                </button>

                <!-- Back to login -->
                <a
                    href="#"
                    class="link-underline text-xs font-medium transition-colors duration-300"
                    style="color: var(--muted);"
                    onmouseover="this.style.color='rgba(255,255,255,0.7)'"
                    onmouseout="this.style.color='var(--muted)'"
                >
                    <span class="inline-flex items-center gap-1.5">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 18 9 12 15 6"/>
                        </svg>
                        Back to Sign In
                    </span>
                </a>

            </div>
        </div>

        <!-- === SUCCESS STATE === -->
        <div id="successState" class="hidden glass-card rounded-3xl w-full max-w-md px-8 sm:px-10 py-10 sm:py-12">
            <div class="success-enter flex flex-col items-center text-center">

                <!-- Success icon with animated ring -->
                <div class="relative mb-7">
                    <div class="ring-pulse w-20 h-20 rounded-full flex items-center justify-center" style="background: rgba(34,197,94,0.1); border: 1.5px solid rgba(34,197,94,0.25);">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline class="check-draw" points="6 12 10 16 18 8"/>
                        </svg>
                    </div>
                </div>

                <!-- Success text -->
                <h2 class="text-2xl sm:text-[1.7rem] font-bold tracking-tight leading-tight mb-2.5">
                    Email Sent Successfully
                </h2>
                <p class="text-sm leading-relaxed mb-2" style="color: var(--muted);">
                    Check your inbox for reset instructions
                </p>
                <p id="sentEmailText" class="text-xs mb-8" style="color: var(--dim);">
                    Sent to you@example.com
                </p>

                <!-- Return button -->
                <button
                    onclick="resetToForm()"
                    class="w-full py-3.5 rounded-2xl text-sm font-semibold text-white cursor-pointer border-0 transition-all duration-300 hover:scale-[1.02] active:scale-[0.98]"
                    style="background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);"
                    onmouseover="this.style.background='rgba(255,255,255,0.1)'"
                    onmouseout="this.style.background='rgba(255,255,255,0.06)'"
                >
                    Back to Sign In
                </button>

                <!-- Resend link -->
                <p class="mt-5 text-xs" style="color: var(--dim);">
                    Didn't receive it?
                    <a
                        href="#"
                        onclick="event.preventDefault(); resetToForm();"
                        class="link-underline font-medium transition-colors duration-300"
                        style="color: var(--muted);"
                        onmouseover="this.style.color='rgba(255,255,255,0.7)'"
                        onmouseout="this.style.color='var(--muted)'"
                    >
                        Try again
                    </a>
                </p>

            </div>
        </div>

    </main>

    <script>
        // =====================
        // Form submission handler
        // =====================
        function handleSubmit() {
            const input = document.getElementById('emailInput');
            const error = document.getElementById('errorMsg');
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const email = input.value.trim();

            // Simple email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!email || !emailRegex.test(email)) {
                // Show error state
                error.classList.remove('hidden');
                input.style.borderColor = 'var(--accent)';
                input.style.boxShadow = '0 0 0 3px var(--accent-glow)';
                input.focus();

                // Clear error on next input
                input.addEventListener('input', function clearErr() {
                    error.classList.add('hidden');
                    input.style.borderColor = '';
                    input.style.boxShadow = '';
                    input.removeEventListener('input', clearErr);
                });
                return;
            }

            // Hide error if visible
            error.classList.add('hidden');
            input.style.borderColor = '';
            input.style.boxShadow = '';

            // Show loading state
            btn.disabled = true;
            btn.style.opacity = '0.8';
            btn.style.cursor = 'not-allowed';
            btnText.innerHTML = '<span class="spinner"></span>';

            // Simulate network request delay
            setTimeout(() => {
                // Update the email text in success state
                document.getElementById('sentEmailText').textContent = 'Sent to ' + email;

                // Transition to success state
                document.getElementById('formState').classList.add('hidden');
                const successEl = document.getElementById('successState');
                successEl.classList.remove('hidden');
                // Re-trigger animation by removing and re-adding class
                const inner = successEl.querySelector('.success-enter');
                inner.style.animation = 'none';
                inner.offsetHeight; // force reflow
                inner.style.animation = '';

                // Reset button state for next time
                btn.disabled = false;
                btn.style.opacity = '';
                btn.style.cursor = '';
                btnText.textContent = 'Send Reset Link';
            }, 1600);
        }

        // =====================
        // Reset back to form state
        // =====================
        function resetToForm() {
            document.getElementById('successState').classList.add('hidden');
            const formEl = document.getElementById('formState');
            formEl.classList.remove('hidden');

            // Re-trigger card entrance animation
            formEl.style.animation = 'none';
            formEl.offsetHeight; // force reflow
            formEl.style.animation = '';

            // Re-trigger stagger animations
            const children = formEl.querySelector('.stagger').children;
            Array.from(children).forEach(child => {
                child.style.animation = 'none';
                child.offsetHeight;
                child.style.animation = '';
            });

            // Clear the input
            document.getElementById('emailInput').value = '';
            document.getElementById('emailInput').focus();
        }

        // =====================
        // Allow Enter key to submit
        // =====================
        document.getElementById('emailInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleSubmit();
            }
        });
    </script>

</body>
</html>
