<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamVault — Change Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        body: ['"Sora"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --bg: #08080f;
            --card: rgba(255,255,255,0.028);
            --card-border: rgba(255,255,255,0.055);
            --accent: #e50914;
            --accent-glow: rgba(229,9,20,0.28);
            --purple: #8b5cf6;
            --purple-glow: rgba(139,92,246,0.2);
            --green: #22c55e;
            --green-glow: rgba(34,197,94,0.25);
            --yellow: #eab308;
            --yellow-glow: rgba(234,179,8,0.2);
            --muted: rgba(255,255,255,0.35);
            --dim: rgba(255,255,255,0.16);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Sora', sans-serif;
            background: var(--bg);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Atmospheric background orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(130px);
            pointer-events: none;
            z-index: 0;
        }
        .orb-1 {
            width: 500px; height: 500px;
            top: -190px; right: -130px;
            background: var(--accent);
            opacity: 0.05;
            animation: drift1 13s ease-in-out infinite;
        }
        .orb-2 {
            width: 440px; height: 440px;
            bottom: -200px; left: -110px;
            background: var(--purple);
            opacity: 0.04;
            animation: drift2 16s ease-in-out infinite;
        }
        .orb-3 {
            width: 260px; height: 260px;
            top: 55%; left: 20%;
            background: var(--accent);
            opacity: 0.018;
            animation: drift3 10s ease-in-out infinite;
        }
        @keyframes drift1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-30px, 28px) scale(1.1); }
        }
        @keyframes drift2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(28px, -32px) scale(1.12); }
        }
        @keyframes drift3 {
            0%, 100% { transform: scale(1); opacity: 0.018; }
            50% { transform: scale(1.3); opacity: 0.03; }
        }

        /* Subtle noise grain */
        .noise {
            position: fixed; inset: 0; z-index: 1;
            pointer-events: none; opacity: 0.012;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 200px 200px;
        }

        /* Glass card */
        .glass-card {
            background: var(--card);
            backdrop-filter: blur(44px) saturate(1.2);
            -webkit-backdrop-filter: blur(44px) saturate(1.2);
            border: 1px solid var(--card-border);
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.015) inset,
                0 24px 70px rgba(0,0,0,0.55),
                0 0 80px rgba(229,9,20,0.02);
        }

        /* Card entrance */
        .card-enter {
            animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(26px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Staggered children */
        .stagger > *:nth-child(1) { animation-delay: 0.1s; }
        .stagger > *:nth-child(2) { animation-delay: 0.18s; }
        .stagger > *:nth-child(3) { animation-delay: 0.26s; }
        .stagger > *:nth-child(4) { animation-delay: 0.34s; }
        .stagger > *:nth-child(5) { animation-delay: 0.42s; }
        .stagger > *:nth-child(6) { animation-delay: 0.50s; }
        .stagger > * {
            opacity: 0;
            animation: childIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes childIn {
            from { opacity: 0; transform: translateY(13px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Password input fields */
        .pw-input {
            background: rgba(255,255,255,0.03);
            border: 1.5px solid rgba(255,255,255,0.06);
            transition: border-color 0.35s ease, box-shadow 0.35s ease, background 0.3s ease;
            outline: none;
        }
        .pw-input:focus {
            border-color: var(--accent);
            background: rgba(255,255,255,0.05);
            box-shadow: 0 0 0 3px var(--accent-glow), 0 0 22px rgba(229,9,20,0.06);
        }
        .pw-input.input-error {
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 3px var(--accent-glow) !important;
        }
        .pw-input.input-valid {
            border-color: var(--green) !important;
            box-shadow: 0 0 0 3px var(--green-glow) !important;
        }

        /* Eye toggle button */
        .eye-btn {
            transition: color 0.25s ease, background 0.25s ease;
        }
        .eye-btn:hover {
            color: rgba(255,255,255,0.6);
            background: rgba(255,255,255,0.06);
        }

        /* Strength bar track */
        .strength-track {
            background: rgba(255,255,255,0.06);
            height: 4px;
            border-radius: 4px;
            overflow: hidden;
        }
        .strength-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.45s cubic-bezier(0.4, 0, 0.2, 1), background 0.45s ease;
            width: 0%;
        }

        /* Strength label transition */
        .strength-label {
            transition: color 0.35s ease;
        }

        /* Gradient button */
        .btn-gradient {
            background: linear-gradient(135deg, var(--accent) 0%, var(--purple) 100%);
            background-size: 200% 200%;
            transition: transform 0.3s ease, box-shadow 0.3s ease, background-position 0.5s ease, opacity 0.3s ease;
        }
        .btn-gradient:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow:
                0 0 28px var(--accent-glow),
                0 0 55px rgba(139,92,246,0.1),
                0 10px 35px rgba(0,0,0,0.4);
            background-position: 100% 100%;
        }
        .btn-gradient:active:not(:disabled) {
            transform: scale(0.98);
        }
        .btn-gradient:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Spinner */
        .spinner {
            display: inline-block;
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Back link underline */
        .link-line { position: relative; display: inline-block; }
        .link-line::after {
            content: '';
            position: absolute;
            bottom: -2px; left: 0;
            width: 0; height: 1px;
            background: rgba(255,255,255,0.45);
            transition: width 0.35s ease;
        }
        .link-line:hover::after { width: 100%; }

        /* Requirement checklist items */
        .req-item {
            transition: color 0.3s ease;
        }
        .req-met {
            color: var(--green) !important;
        }
        .req-icon {
            transition: opacity 0.25s ease, transform 0.25s ease;
        }

        /* Success state */
        .success-enter {
            animation: successIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes successIn {
            from { opacity: 0; transform: translateY(22px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .ring-pulse {
            animation: ringPulse 2s ease-in-out infinite;
        }
        @keyframes ringPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.3); }
            50% { box-shadow: 0 0 0 14px rgba(34,197,94,0); }
        }
        .check-draw {
            stroke-dasharray: 30;
            stroke-dashoffset: 30;
            animation: drawCheck 0.45s 0.35s ease forwards;
        }
        @keyframes drawCheck { to { stroke-dashoffset: 0; } }

        /* Shake for errors */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-5px); }
            40% { transform: translateX(5px); }
            60% { transform: translateX(-3px); }
            80% { transform: translateX(3px); }
        }
        .shake { animation: shake 0.4s ease; }

        /* Focus visible */
        *:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
            border-radius: 8px;
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

    <!-- Background atmosphere -->
    <div class="orb orb-1" aria-hidden="true"></div>
    <div class="orb orb-2" aria-hidden="true"></div>
    <div class="orb orb-3" aria-hidden="true"></div>
    <div class="noise" aria-hidden="true"></div>

    <!-- Main centered content -->
    <main class="relative z-10 min-h-screen flex items-center justify-center px-4 py-12">

        <!-- ===== PASSWORD FORM STATE ===== -->
        <div id="pwForm" class="glass-card card-enter rounded-3xl w-full max-w-[440px] px-7 sm:px-10 py-10 sm:py-12">
            <div class="stagger flex flex-col items-center">

                <!-- Shield icon -->
                <div class="mb-7">
                    <div class="w-14 h-14 rounded-2xl flex items-center justify-center relative" style="background: linear-gradient(135deg, rgba(229,9,20,0.1), rgba(139,92,246,0.08)); border: 1px solid rgba(229,9,20,0.12);">
                        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                            <path d="M9 12l2 2 4-4" stroke="var(--purple)" stroke-width="2"/>
                        </svg>
                        <div class="absolute inset-0 rounded-2xl" style="box-shadow: 0 0 35px rgba(229,9,20,0.06);" aria-hidden="true"></div>
                    </div>
                </div>

                <!-- Title & subtitle -->
                <div class="text-center mb-8">
                    <h1 class="text-[1.6rem] sm:text-[1.75rem] font-bold tracking-tight leading-tight mb-2">
                        Set New Password
                    </h1>
                    <p class="text-sm leading-relaxed" style="color: var(--muted);">
                        Your password must be strong and secure
                    </p>
                </div>

                <!-- New Password field -->
                <div class="w-full mb-1.5">
                    <label for="newPw" class="sr-only">New password</label>
                    <div class="relative">
                        <div class="absolute left-4 top-1/2 -translate-y-1/2 pointer-events-none" style="color: var(--dim);">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="3"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                        </div>
                        <input
                            id="newPw"
                            type="password"
                            placeholder="New password"
                            autocomplete="new-password"
                            class="pw-input w-full pl-12 pr-12 py-3.5 rounded-2xl text-sm text-white placeholder-white/20"
                            oninput="evaluateStrength()"
                        >
                        <!-- Eye toggle -->
                        <button
                            type="button"
                            onclick="toggleEye('newPw', 'eyeNew')"
                            class="eye-btn absolute right-3 top-1/2 -translate-y-1/2 w-8 h-8 rounded-lg flex items-center justify-center"
                            style="color: var(--dim);"
                            aria-label="Toggle password visibility"
                            id="eyeNew"
                        >
                            <svg class="eye-open" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg class="eye-closed hidden" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                                <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Strength bar + label -->
                <div class="w-full mb-1">
                    <div class="strength-track">
                        <div id="strengthFill" class="strength-fill"></div>
                    </div>
                </div>
                <div class="w-full flex items-center justify-between mb-4">
                    <span id="strengthLabel" class="strength-label text-[11px] font-medium" style="color: var(--dim);">Enter a password</span>
                    <span id="strengthScore" class="text-[11px] font-semibold tabular-nums" style="color: var(--dim);"></span>
                </div>

                <!-- Requirements checklist -->
                <div class="w-full mb-6 grid grid-cols-2 gap-x-4 gap-y-2 px-1" id="reqList">
                    <div class="req-item flex items-center gap-2 text-[11px]" style="color: var(--dim);" data-req="length">
                        <svg class="req-icon shrink-0 opacity-0" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
                        <span>8+ characters</span>
                    </div>
                    <div class="req-item flex items-center gap-2 text-[11px]" style="color: var(--dim);" data-req="upper">
                        <svg class="req-icon shrink-0 opacity-0" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
                        <span>Uppercase letter</span>
                    </div>
                    <div class="req-item flex items-center gap-2 text-[11px]" style="color: var(--dim);" data-req="lower">
                        <svg class="req-icon shrink-0 opacity-0" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
                        <span>Lowercase letter</span>
                    </div>
                    <div class="req-item flex items-center gap-2 text-[11px]" style="color: var(--dim);" data-req="number">
                        <svg class="req-icon shrink-0 opacity-0" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
                        <span>Number</span>
                    </div>
                    <div class="req-item flex items-center gap-2 text-[11px]" style="color: var(--dim);" data-req="special">
                        <svg class="req-icon shrink-0 opacity-0" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
                        <span>Special character</span>
                    </div>
                    <div class="req-item flex items-center gap-2 text-[11px]" style="color: var(--dim);" data-req="match">
                        <svg class="req-icon shrink-0 opacity-0" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
                        <span>Passwords match</span>
                    </div>
                </div>

                <!-- Confirm Password field -->
                <div class="w-full mb-2">
                    <label for="confirmPw" class="sr-only">Confirm password</label>
                    <div class="relative">
                        <div class="absolute left-4 top-1/2 -translate-y-1/2 pointer-events-none" style="color: var(--dim);">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                                <polyline points="9 12 12 15 16 10" stroke-width="2"/>
                            </svg>
                        </div>
                        <input
                            id="confirmPw"
                            type="password"
                            placeholder="Confirm password"
                            autocomplete="new-password"
                            class="pw-input w-full pl-12 pr-12 py-3.5 rounded-2xl text-sm text-white placeholder-white/20"
                            oninput="evaluateStrength()"
                        >
                        <button
                            type="button"
                            onclick="toggleEye('confirmPw', 'eyeConfirm')"
                            class="eye-btn absolute right-3 top-1/2 -translate-y-1/2 w-8 h-8 rounded-lg flex items-center justify-center"
                            style="color: var(--dim);"
                            aria-label="Toggle password visibility"
                            id="eyeConfirm"
                        >
                            <svg class="eye-open" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg class="eye-closed hidden" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                                <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Match indicator -->
                <div id="matchMsg" class="w-full h-5 mb-5 flex items-center gap-1.5 px-1">
                    <!-- Filled dynamically by JS -->
                </div>

                <!-- Submit button -->
                <button
                    id="submitBtn"
                    onclick="handleSubmit()"
                    disabled
                    class="btn-gradient w-full py-3.5 rounded-2xl text-sm font-semibold text-white cursor-pointer border-0 mb-5"
                >
                    <span id="submitText">Update Password</span>
                </button>

                <!-- Back to login -->
                <a
                    href="#"
                    class="link-line text-xs font-medium transition-colors duration-300"
                    style="color: var(--muted);"
                    onmouseover="this.style.color='rgba(255,255,255,0.7)'"
                    onmouseout="this.style.color='var(--muted)'"
                >
                    <span class="inline-flex items-center gap-1.5">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 18 9 12 15 6"/>
                        </svg>
                        Back to Sign In
                    </span>
                </a>

            </div>
        </div>

        <!-- ===== SUCCESS STATE ===== -->
        <div id="successState" class="hidden glass-card rounded-3xl w-full max-w-[440px] px-7 sm:px-10 py-10 sm:py-12">
            <div class="success-enter flex flex-col items-center text-center">

                <!-- Animated success icon -->
                <div class="relative mb-7">
                    <div class="ring-pulse w-20 h-20 rounded-full flex items-center justify-center" style="background: rgba(34,197,94,0.08); border: 1.5px solid rgba(34,197,94,0.2);">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline class="check-draw" points="6 12 10 16 18 8"/>
                        </svg>
                    </div>
                </div>

                <h2 class="text-[1.6rem] sm:text-[1.75rem] font-bold tracking-tight leading-tight mb-2.5">
                    Password Updated Successfully
                </h2>
                <p class="text-sm leading-relaxed mb-2" style="color: var(--muted);">
                    You can now sign in with your new password
                </p>
                <p class="text-xs mb-8" style="color: var(--dim);">
                    Your session has been secured
                </p>

                <!-- Continue button -->
                <button
                    onclick="resetForm()"
                    class="w-full py-3.5 rounded-2xl text-sm font-semibold text-white cursor-pointer border-0 transition-all duration-300 hover:scale-[1.02] active:scale-[0.98]"
                    style="background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);"
                    onmouseover="this.style.background='rgba(255,255,255,0.1)'"
                    onmouseout="this.style.background='rgba(255,255,255,0.06)'"
                >
                    Continue to Sign In
                </button>
            </div>
        </div>

    </main>

    <script>
        // ============================
        // Toggle password visibility
        // ============================
        function toggleEye(inputId, btnId) {
            const input = document.getElementById(inputId);
            const btn = document.getElementById(btnId);
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            // Swap eye icon visibility
            btn.querySelector('.eye-open').classList.toggle('hidden', isPassword);
            btn.querySelector('.eye-closed').classList.toggle('hidden', !isPassword);
        }

        // ============================
        // Password strength evaluation
        // ============================
        function evaluateStrength() {
            const pw = document.getElementById('newPw').value;
            const confirm = document.getElementById('confirmPw').value;
            const fill = document.getElementById('strengthFill');
            const label = document.getElementById('strengthLabel');
            const score = document.getElementById('strengthScore');
            const matchMsg = document.getElementById('matchMsg');
            const submitBtn = document.getElementById('submitBtn');

            // Check individual requirements
            const reqs = {
                length: pw.length >= 8,
                upper: /[A-Z]/.test(pw),
                lower: /[a-z]/.test(pw),
                number: /[0-9]/.test(pw),
                special: /[^A-Za-z0-9]/.test(pw),
                match: pw.length > 0 && confirm.length > 0 && pw === confirm,
            };

            // Update requirement checklist UI
            Object.entries(reqs).forEach(([key, met]) => {
                const el = document.querySelector(`[data-req="${key}"]`);
                const icon = el.querySelector('.req-icon');
                if (met) {
                    el.classList.add('req-met');
                    icon.style.opacity = '1';
                    icon.style.transform = 'scale(1)';
                } else {
                    el.classList.remove('req-met');
                    icon.style.opacity = '0';
                    icon.style.transform = 'scale(0.5)';
                }
            });

            // Calculate strength score (0–5, excluding match)
            const metCount = Object.entries(reqs).filter(([k]) => k !== 'match').filter(([, v]) => v).length;

            // Update strength bar
            if (pw.length === 0) {
                fill.style.width = '0%';
                fill.style.background = 'transparent';
                label.textContent = 'Enter a password';
                label.style.color = 'var(--dim)';
                score.textContent = '';
            } else if (metCount <= 2) {
                fill.style.width = '25%';
                fill.style.background = 'var(--accent)';
                label.textContent = 'Weak';
                label.style.color = 'var(--accent)';
                score.textContent = '1/5';
                score.style.color = 'var(--accent)';
            } else if (metCount <= 3) {
                fill.style.width = '55%';
                fill.style.background = 'var(--yellow)';
                label.textContent = 'Medium';
                label.style.color = 'var(--yellow)';
                score.textContent = '3/5';
                score.style.color = 'var(--yellow)';
            } else if (metCount === 4) {
                fill.style.width = '80%';
                fill.style.background = '#84cc16';
                label.textContent = 'Strong';
                label.style.color = '#84cc16';
                score.textContent = '4/5';
                score.style.color = '#84cc16';
            } else {
                fill.style.width = '100%';
                fill.style.background = 'var(--green)';
                label.textContent = 'Very Strong';
                label.style.color = 'var(--green)';
                score.textContent = '5/5';
                score.style.color = 'var(--green)';
            }

            // Match indicator
            const newInput = document.getElementById('newPw');
            const confirmInput = document.getElementById('confirmPw');

            // Clear previous states
            newInput.classList.remove('input-error', 'input-valid');
            confirmInput.classList.remove('input-error', 'input-valid');

            if (confirm.length > 0) {
                if (pw === confirm) {
                    matchMsg.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg><span class="text-[11px]" style="color:var(--green)">Passwords match</span>`;
                    confirmInput.classList.add('input-valid');
                } else {
                    matchMsg.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg><span class="text-[11px]" style="color:var(--accent)">Passwords do not match</span>`;
                    confirmInput.classList.add('input-error');
                }
            } else {
                matchMsg.innerHTML = '';
            }

            // Enable submit only when all requirements met and passwords match
            const allMet = Object.values(reqs).every(v => v);
            submitBtn.disabled = !allMet;
        }

        // ============================
        // Form submission
        // ============================
        function handleSubmit() {
            const pw = document.getElementById('newPw').value;
            const confirm = document.getElementById('confirmPw').value;
            const submitBtn = document.getElementById('submitBtn');
            const submitText = document.getElementById('submitText');
            const confirmInput = document.getElementById('confirmPw');

            // Final validation
            if (pw !== confirm) {
                confirmInput.classList.add('input-error');
                const matchMsg = document.getElementById('matchMsg');
                matchMsg.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg><span class="text-[11px]" style="color:var(--accent)">Passwords do not match</span>`;
                confirmInput.classList.add('shake');
                setTimeout(() => confirmInput.classList.remove('shake'), 450);
                return;
            }

            // Show loading
            submitBtn.disabled = true;
            submitText.innerHTML = '<span class="spinner"></span>';

            // Simulate API call
            setTimeout(() => {
                // Transition to success
                document.getElementById('pwForm').classList.add('hidden');
                const successEl = document.getElementById('successState');
                successEl.classList.remove('hidden');

                // Re-trigger animation
                const inner = successEl.querySelector('.success-enter');
                inner.style.animation = 'none';
                inner.offsetHeight;
                inner.style.animation = '';

                // Reset button
                submitBtn.disabled = false;
                submitText.textContent = 'Update Password';
            }, 1500);
        }

        // ============================
        // Reset form for demo
        // ============================
        function resetForm() {
            document.getElementById('successState').classList.add('hidden');
            const formEl = document.getElementById('pwForm');
            formEl.classList.remove('hidden');

            // Re-trigger entrance animations
            formEl.style.animation = 'none';
            formEl.offsetHeight;
            formEl.style.animation = '';

            const children = formEl.querySelector('.stagger').children;
            Array.from(children).forEach(child => {
                child.style.animation = 'none';
                child.offsetHeight;
                child.style.animation = '';
            });

            // Clear all fields and states
            document.getElementById('newPw').value = '';
            document.getElementById('confirmPw').value = '';
            document.getElementById('newPw').type = 'password';
            document.getElementById('confirmPw').type = 'password';
            document.getElementById('newPw').classList.remove('input-error', 'input-valid');
            document.getElementById('confirmPw').classList.remove('input-error', 'input-valid');
            document.getElementById('matchMsg').innerHTML = '';
            document.getElementById('strengthFill').style.width = '0%';
            document.getElementById('strengthLabel').textContent = 'Enter a password';
            document.getElementById('strengthLabel').style.color = 'var(--dim)';
            document.getElementById('strengthScore').textContent = '';
            document.getElementById('submitBtn').disabled = true;

            // Reset eye icons
            document.querySelectorAll('.eye-open').forEach(el => el.classList.remove('hidden'));
            document.querySelectorAll('.eye-closed').forEach(el => el.classList.add('hidden'));

            // Reset requirement checklist
            document.querySelectorAll('.req-item').forEach(el => {
                el.classList.remove('req-met');
                const icon = el.querySelector('.req-icon');
                icon.style.opacity = '0';
                icon.style.transform = 'scale(0.5)';
            });

            // Focus first input
            setTimeout(() => document.getElementById('newPw').focus(), 600);
        }

        // Allow Enter key to submit
        document.getElementById('newPw').addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                if (!document.getElementById('submitBtn').disabled) handleSubmit();
                else document.getElementById('confirmPw').focus();
            }
        });
        document.getElementById('confirmPw').addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                if (!document.getElementById('submitBtn').disabled) handleSubmit();
            }
        });
    </script>

</body>
</html>
